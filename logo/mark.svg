<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!--
    Many Paths — Logo Mark
    Seven traditions, each trailing a curved path, converging to one point.

    Dot positions (radius 150 from center 256,256):
    1 Christianity #378ADD  (256, 106)  r=21
    2 Judaism     #BA7517  (373, 163)  r=18
    3 Islam       #1D9E75  (402, 289)  r=20
    4 Buddhism    #D85A30  (321, 391)  r=23
    5 Hinduism    #534AB7  (191, 391)  r=19
    6 Taoism      #888780  (110, 289)  r=16
    7 Sikhism     #639922  (139, 163)  r=20

    Paths: quadratic bezier, control points rotated 45° clockwise from midpoint
    Center convergence: (256, 256)  r=15  #1C1A2E
  -->
  <defs>
    <!-- Trail gradients: full color at dot → transparent at center -->
    <linearGradient id="mp-g1" x1="256" y1="106" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#378ADD" stop-opacity="1"/>
      <stop offset="100%" stop-color="#378ADD" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mp-g2" x1="373" y1="163" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#BA7517" stop-opacity="1"/>
      <stop offset="100%" stop-color="#BA7517" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mp-g3" x1="402" y1="289" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1D9E75" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mp-g4" x1="321" y1="391" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#D85A30" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D85A30" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mp-g5" x1="191" y1="391" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#534AB7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#534AB7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mp-g6" x1="110" y1="289" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#888780" stop-opacity="1"/>
      <stop offset="100%" stop-color="#888780" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mp-g7" x1="139" y1="163" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#639922" stop-opacity="1"/>
      <stop offset="100%" stop-color="#639922" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Curved trails — drawn first so dots sit on top -->
  <!-- Christianity: top → clockwise arc to center -->
  <path d="M 256 106 Q 203 203 256 256"
        stroke="url(#mp-g1)" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Judaism: upper-right → arc -->
  <path d="M 373 163 Q 264 181 256 256"
        stroke="url(#mp-g2)" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- Islam: right → arc -->
  <path d="M 402 289 Q 319 216 256 256"
        stroke="url(#mp-g3)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Buddhism: lower-right → arc -->
  <path d="M 321 391 Q 327 281 256 256"
        stroke="url(#mp-g4)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Hinduism: lower-left → arc -->
  <path d="M 191 391 Q 281 327 256 256"
        stroke="url(#mp-g5)" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- Taoism: left → arc -->
  <path d="M 110 289 Q 216 319 256 256"
        stroke="url(#mp-g6)" stroke-width="9"  fill="none" stroke-linecap="round"/>
  <!-- Sikhism: upper-left → arc -->
  <path d="M 139 163 Q 182 264 256 256"
        stroke="url(#mp-g7)" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Outer tradition dots -->
  <circle cx="256" cy="106" r="21" fill="#378ADD"/>  <!-- Christianity -->
  <circle cx="373" cy="163" r="18" fill="#BA7517"/>  <!-- Judaism     -->
  <circle cx="402" cy="289" r="20" fill="#1D9E75"/>  <!-- Islam       -->
  <circle cx="321" cy="391" r="23" fill="#D85A30"/>  <!-- Buddhism    -->
  <circle cx="191" cy="391" r="19" fill="#534AB7"/>  <!-- Hinduism    -->
  <circle cx="110" cy="289" r="16" fill="#888780"/>  <!-- Taoism      -->
  <circle cx="139" cy="163" r="20" fill="#639922"/>  <!-- Sikhism     -->

  <!-- Center convergence point -->
  <circle cx="256" cy="256" r="15" fill="#1C1A2E"/>
</svg>
