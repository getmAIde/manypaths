<svg width="3000" height="1000" viewBox="0 0 3000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Many Paths — Bluesky Banner 3000x1000 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0e0a06"/>
      <stop offset="35%"  stop-color="#1e1208"/>
      <stop offset="65%"  stop-color="#1e1208"/>
      <stop offset="100%" stop-color="#0e0a06"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#c8900e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c8900e" stop-opacity="0"/>
    </radialGradient>
    <!-- Trail gradients centered at 1500,500 -->
    <linearGradient id="bg1" x1="1500" y1="207" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#378ADD"/><stop offset="100%" stop-color="#378ADD" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg2" x1="1729" y1="318" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BA7517"/><stop offset="100%" stop-color="#BA7517" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg3" x1="1785" y1="564" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D9E75"/><stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg4" x1="1627" y1="764" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D85A30"/><stop offset="100%" stop-color="#D85A30" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg5" x1="1373" y1="764" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#534AB7"/><stop offset="100%" stop-color="#534AB7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg6" x1="1215" y1="564" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#888780"/><stop offset="100%" stop-color="#888780" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg7" x1="1271" y1="318" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#639922"/><stop offset="100%" stop-color="#639922" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="3000" height="1000" fill="url(#bg)"/>
  <ellipse cx="1500" cy="480" rx="900" ry="600" fill="url(#glow)"/>

  <!-- Mark centered at 1500,500 — same scale as avatar -->
  <path d="M 1500 207 Q 1396 396 1500 500" stroke="url(#bg1)" stroke-width="25" fill="none" stroke-linecap="round"/>
  <path d="M 1729 318 Q 1516 354 1500 500" stroke="url(#bg2)" stroke-width="21" fill="none" stroke-linecap="round"/>
  <path d="M 1785 564 Q 1623 422 1500 500" stroke="url(#bg3)" stroke-width="23" fill="none" stroke-linecap="round"/>
  <path d="M 1627 764 Q 1639 549 1500 500" stroke="url(#bg4)" stroke-width="27" fill="none" stroke-linecap="round"/>
  <path d="M 1373 764 Q 1549 639 1500 500" stroke="url(#bg5)" stroke-width="21" fill="none" stroke-linecap="round"/>
  <path d="M 1215 564 Q 1422 623 1500 500" stroke="url(#bg6)" stroke-width="17" fill="none" stroke-linecap="round"/>
  <path d="M 1271 318 Q 1356 516 1500 500" stroke="url(#bg7)" stroke-width="23" fill="none" stroke-linecap="round"/>
  <circle cx="1500" cy="207" r="41" fill="#378ADD"/>
  <circle cx="1729" cy="318" r="35" fill="#BA7517"/>
  <circle cx="1785" cy="564" r="39" fill="#1D9E75"/>
  <circle cx="1627" cy="764" r="45" fill="#D85A30"/>
  <circle cx="1373" cy="764" r="37" fill="#534AB7"/>
  <circle cx="1215" cy="564" r="31" fill="#888780"/>
  <circle cx="1271" cy="318" r="39" fill="#639922"/>
  <circle cx="1500" cy="500" r="29" fill="#1C1A2E"/>

  <!-- Wordmark: MANY hairline / PATHS semibold — Josefin Sans #6 -->
  <style>@import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;600&amp;display=swap');</style>

  <!-- Left side: MANYPATHS wordmark -->
  <text y="510" font-family="'Josefin Sans','Century Gothic',sans-serif" font-size="88" letter-spacing="14" text-anchor="end">
    <tspan x="1160" font-weight="100" fill="#907030">MANY</tspan>
  </text>
  <text y="510" font-family="'Josefin Sans','Century Gothic',sans-serif" font-size="88" letter-spacing="14" text-anchor="start">
    <tspan x="1840" font-weight="600" fill="#c8900e">PATHS</tspan>
  </text>

  <!-- Tagline below, centered -->
  <text
    x="1500" y="590"
    font-family="'Josefin Sans','Century Gothic',sans-serif"
    font-size="32" font-weight="100" letter-spacing="10"
    text-anchor="middle" fill="#7a5a30">
    ONE DESTINATION
  </text>

  <!-- URL bottom-center -->
  <text
    x="1500" y="950"
    font-family="'Josefin Sans','Century Gothic',sans-serif"
    font-size="22" font-weight="100" letter-spacing="5"
    text-anchor="middle" fill="#4a3a20" fill-opacity="0.6">
    manypaths.one
  </text>
</svg>
