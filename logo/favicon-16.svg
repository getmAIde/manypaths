  <circle cx="23.8" cy="9.8"  r="2.2" fill="#BA7517"/>  <!-- Judaism      -->
  <circle cx="25.7" cy="18.2" r="2.4" fill="#1D9E75"/>  <!-- Islam        -->
  <circle cx="20.3" cy="25"   r="2.6" fill="#D85A30"/>  <!-- Buddhism     -->
  <circle cx="11.7" cy="25"   r="2.2" fill="#534AB7"/>  <!-- Hinduism     -->
  <circle cx="6.3"  cy="18.2" r="2.0" fill="#888780"/>  <!-- Taoism       -->
  <circle cx="8.2"  cy="9.8"  r="2.3" fill="#639922"/>  <!-- Sikhism      -->
  <!-- Center -->
  <circle cx="16"   cy="16"   r="2.0" fill="#1C1A2E"/>
</svg>
