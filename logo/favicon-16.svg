<svg width="16" height="16" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    Many Paths — Favicon 16px
    Simplified: dots only, no trails (invisible at 16px)
    ViewBox 32x32 for crisp rendering, displayed at 16x16
  -->
  <!-- Outer tradition dots (radius 10 from center 16,16) -->
